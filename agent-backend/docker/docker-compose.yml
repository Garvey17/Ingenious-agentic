version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: deep-research-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - ../.env
    depends_on:
      - qdrant
    networks:
      - research-network
    restart: unless-stopped
    volumes:
      - ../app:/app/app # For development hot-reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: deep-research-qdrant
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC port
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - research-network
    restart: unless-stopped

networks:
  research-network:
    driver: bridge

volumes:
  qdrant_storage:
    driver: local
